name: Build & Package

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: Open-Fin-Windows
          - os: macos-latest
            artifact: Open-Fin-macOS
          - os: ubuntu-latest
            artifact: Open-Fin-Linux

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      # ---- Backend: install deps + freeze ----

      - name: Install backend dependencies
        working-directory: backend
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run backend tests
        working-directory: backend
        run: python -m pytest tests/ --tb=short -q

      - name: Build backend binaries (PyInstaller)
        working-directory: backend
        run: python build.py

      - name: Smoke-test frozen API binary
        working-directory: backend
        run: python test_frozen.py
        timeout-minutes: 3

      # ---- Frontend: install, typecheck, build + package ----

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Frontend typecheck
        working-directory: frontend
        run: npm run typecheck

      - name: Build renderer + electron
        working-directory: frontend
        run: |
          npm run build:renderer
          npm run build:electron

      - name: Package with electron-builder
        working-directory: frontend
        run: npx electron-builder --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            frontend/dist/package/*.exe
            frontend/dist/package/*.dmg
            frontend/dist/package/*.AppImage
            frontend/dist/package/*.snap
            frontend/dist/package/*.deb
          if-no-files-found: warn
          retention-days: 30

  # Optional: publish release assets when a tag is pushed
  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
